<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Masters Draft Board</title>
  <style>
    :root{--bg:#f3efe4;--panel:#fffaf0;--ink:#1e2a1f;--muted:#5b6659;--line:#d7c9aa;--accent:#1d5c35;--accent2:#af7d28;--shadow:0 18px 40px rgba(31,41,28,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:Georgia,"Times New Roman",serif;color:var(--ink);background:linear-gradient(180deg,#efe4c7 0%,var(--bg) 45%,#e7efdf 100%)}
    .page{max-width:1400px;margin:0 auto;padding:28px 18px 40px}.hero,.panel{background:var(--panel);border:1px solid rgba(215,201,170,.8);border-radius:22px;box-shadow:var(--shadow)}
    .hero{padding:26px;background:linear-gradient(135deg,rgba(29,92,53,.96),rgba(18,53,31,.96));color:#fffaf0}.hero p{max-width:900px;line-height:1.5}
    .chips,.toolbar,.round-picks,.score-meta,.status-row{display:flex;flex-wrap:wrap;gap:10px}.chips{margin-top:16px}
    .chip,.pill{padding:8px 12px;border-radius:999px;font-size:.95rem}.chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18)}
    .layout{display:grid;grid-template-columns:1.08fr 1fr;gap:22px;margin-top:22px}.panel{padding:20px}.section-head{margin-bottom:14px}.section-head p,.muted,.footer,.small{color:var(--muted)}
    button,a.btn{border:0;border-radius:12px;padding:10px 14px;font:inherit;cursor:pointer;background:var(--accent);color:#fff9ee;text-decoration:none}
    button.secondary{background:#e4d3af;color:var(--ink)} button.ghost,a.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)} button:disabled{opacity:.55;cursor:not-allowed}
    input[type="search"]{width:100%;border:1px solid var(--line);border-radius:12px;background:#fffdf7;color:var(--ink);padding:10px 12px;font:inherit}
    .clock{margin-bottom:18px;padding:18px;border-radius:18px;background:linear-gradient(135deg,var(--accent),#2e7d49);color:#fff9ee}.eyebrow{font-size:.84rem;letter-spacing:.08em;text-transform:uppercase;opacity:.8}
    .clock-name{margin-top:8px;font-size:clamp(1.9rem,4vw,3.1rem);line-height:1}.clock-meta{margin-top:10px;line-height:1.45}
    .order-board{display:grid;gap:12px;margin-bottom:18px}.round{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fffcf6}
    .round-title{margin-bottom:10px;color:var(--muted);font-size:.92rem;text-transform:uppercase;letter-spacing:.05em}.pill{background:#ede1c5;color:var(--ink)}.pill.active{background:var(--accent);color:#fff9ee}.pill.done{background:#dfeadf;color:#31563b}
    .people,.results{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.results{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
    .card{background:linear-gradient(180deg,rgba(248,241,223,.95),rgba(255,252,245,.95));border:1px solid var(--line);border-radius:18px;padding:16px}
    .card.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(29,92,53,.15)}.name{font-size:1.25rem;margin-bottom:12px}
    .pick-list,.player-stack{display:grid;gap:10px}.pick,.player{border-radius:14px;background:#fffdf7;border:1px solid #eadfcb;padding:10px 12px}.pick.current,.player.counting{border-color:var(--accent2);background:#fff5dc}
    .label{display:block;margin-bottom:4px;color:var(--muted);font-size:.84rem;text-transform:uppercase;letter-spacing:.04em}.summary{margin-top:16px;padding:14px;border-radius:16px;background:#f7f1e4;border:1px dashed var(--accent2);line-height:1.5}
    .players-wrap{max-height:900px;overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fffdf8} table{width:100%;border-collapse:collapse}
    thead th{position:sticky;top:0;background:#efe2bf;z-index:1;text-align:left;padding:12px;font-size:.85rem;letter-spacing:.04em;text-transform:uppercase}
    tbody td{padding:10px 12px;border-top:1px solid #eee2c8;vertical-align:top} tbody tr:nth-child(even){background:#fffcf4}
    .tag{display:inline-block;margin-right:6px;margin-top:4px;border-radius:999px;padding:4px 8px;font-size:.78rem;background:#e8f1e9;color:var(--accent)} .tag.first{background:#eadff5;color:#5a2c7d} .tag.amateur{background:#f8e7c7;color:#7d5511} .tag.counting{background:#dfeadf;color:#31563b} .tag.alt{background:#f1e5c8;color:#7a5a13}
    .result-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.place{min-width:52px;text-align:center;padding:8px 10px;border-radius:14px;background:#efe2bf;font-weight:700}.score{font-size:1.6rem;line-height:1;margin-bottom:8px}
    @media (max-width:1080px){.layout{grid-template-columns:1fr}} @media (max-width:720px){.page{padding:18px 14px 32px}.people,.results{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page" id="app"></div>
  <script>
    const people=["Samuel","Tristana","Gaza","Mason","Nosrac"];
    const slots=[{key:"pick1",label:"Golfer 1",starter:true},{key:"pick2",label:"Golfer 2",starter:true},{key:"pick3",label:"Golfer 3",starter:true},{key:"alt",label:"Alternate",starter:false}];
    const storageKey="masters-draft-board-2026-v3";
    const scoresFeedUrl="https://www.masters.com/en_US/scores/feeds/2026/scores.json";
    const isResultsView=new URLSearchParams(location.search).get("view")==="results";
    let liveScoresState={status:"idle",updatedAt:null,players:[]};
    let liveScoresTimer=null;
    const rawPlayers=`Ludvig Åberg|Sweden

    const players=rawPlayers.split("\n").map((line)=>{const [name,country,flags=""]=line.split("|");const list=flags.split(",");return{name,country,first:list.includes("first"),amateur:list.includes("amateur")};});
    const powerRankingOrder=[
      "Jon Rahm","Xander Schauffele","Scottie Scheffler","Rory McIlroy","Bryson DeChambeau","Cameron Young","Tommy Fleetwood","Patrick Reed","Matt Fitzpatrick","Ludvig Ã…berg",
      "Robert MacIntyre","Hideki Matsuyama","Justin Thomas","Russell Henley","Justin Rose","Min Woo Lee","Si Woo Kim","Jordan Spieth","Brooks Koepka","Adam Scott",
      "Akshay Bhatia","Chris Gotterup","Corey Conners","Jacob Bridgeman","Sepp Straka","J.J. Spaun","Viktor Hovland","Patrick Cantlay","Jake Knapp","Nicolai HÃ¸jgaard",
      "Maverick McNealy","Harris English","Shane Lowry","Jason Day","Matt McCarty","Tyrrell Hatton","Max Homa","Gary Woodland","Cameron Smith","Sungjae Im",
      "Sam Burns","Daniel Berger","Nick Taylor","Alex Noren","Harry Hall","Ryan Fox","Kurt Kitayama","Marco Penge","Keegan Bradley","Rasmus Neergaard-Petersen",
      "Aaron Rai","Nicolas Echavarria","Andrew Novak","Sam Stevens","Tom McKibbin","Carlos Ortiz","Rasmus HÃ¸jgaard","Ryan Gerard","Wyndham Clark","Ben Griffin",
      "Ethan Fang","Brian Harman","Michael Brennan","Dustin Johnson","Michael Kim","Max Greyserman","Mason Howell","Zach Johnson","John Keefer","Kristoffer Reitan",
      "Haotong Li","Aldrich Potgieter","Sergio Garcia","Sami Valimaki","Angel Cabrera","Brian Campbell","Fred Couples","Jackson Herrington","Brandon Holtz","Casey Jarvis",
      "Naoyuki Kataoka","Fifa Laopakdee","Jose Maria Olazabal","Mateo Pulcini","Davis Riley","Charl Schwartzel","Vijay Singh","Bubba Watson","Mike Weir","Danny Willett"
    ];
    const powerRankByName=new Map(powerRankingOrder.map((name,index)=>[name,index+1]));
    const sortedPlayers=[...players].sort((a,b)=>{const ar=powerRankByName.get(a.name)??999;const br=powerRankByName.get(b.name)??999;if(ar!==br)return ar-br;return a.name.localeCompare(b.name);});
    function baseManagers(){return people.map((name)=>({name,pick1:"",pick2:"",pick3:"",alt:""}));}
    function defaultState(){return{managers:baseManagers(),draftOrder:[],pickHistory:[]};}
    function loadState(){try{const raw=localStorage.getItem(storageKey);if(!raw)return defaultState();const parsed=JSON.parse(raw);if(!parsed||!Array.isArray(parsed.managers)||parsed.managers.length!==people.length)return defaultState();return{managers:people.map((name,i)=>({...baseManagers()[i],...(parsed.managers[i]||{}),name})),draftOrder:Array.isArray(parsed.draftOrder)?parsed.draftOrder.filter((v)=>Number.isInteger(v)&&v>=0&&v<people.length):[],pickHistory:Array.isArray(parsed.pickHistory)?parsed.pickHistory:[]};}catch{return defaultState();}}
    let state=loadState();
    function saveState(){localStorage.setItem(storageKey,JSON.stringify(state));}
    function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}
    function norm(v){return String(v||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();}
    function shuffle(arr){const copy=[...arr];for(let i=copy.length-1;i>0;i-=1){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]];}return copy;}
    function pickedMap(){const map=new Map();state.managers.forEach((m)=>slots.forEach((s)=>{if(m[s.key])map.set(m[s.key],m.name);}));return map;}
    function buildSnakeSequence(order){const seq=[];slots.forEach((slot,roundIndex)=>{const roundOrder=roundIndex%2===0?order:[...order].reverse();roundOrder.forEach((managerIndex)=>{seq.push({managerIndex,slotKey:slot.key,slotLabel:slot.label,round:roundIndex+1,overallPick:seq.length+1});});});return seq;}
    function currentTurn(){if(state.draftOrder.length!==people.length)return null;return buildSnakeSequence(state.draftOrder)[state.pickHistory.length]||null;}
    function resultsUrl(){const url=new URL(location.href);url.searchParams.set("view","results");return url.toString();}
    function openResultsTab(){window.open(resultsUrl(),"_blank","noopener");}
    function draftPlayer(playerName){const turn=currentTurn();if(!turn||pickedMap().has(playerName))return;state.managers[turn.managerIndex][turn.slotKey]=playerName;state.pickHistory.push({playerName,managerIndex:turn.managerIndex,slotKey:turn.slotKey});saveState();const finished=state.pickHistory.length===people.length*slots.length;renderDraft();if(finished)openResultsTab();}
    function resetDraft(){state=defaultState();saveState();renderDraft();}
    function formatOrderLine(){return state.draftOrder.length!==people.length?"Not generated yet":state.draftOrder.map((i)=>state.managers[i].name).join(" -> ");}
    function parseScoreValue(value){if(value===null||value===undefined||value==="")return null;const text=String(value).trim().toUpperCase();if(text==="E")return 0;if(/^[+-]?\d+$/.test(text))return Number(text);return null;}
    function formatToPar(value){if(value===null||value===undefined)return"Not started";if(value===0)return"E";return value>0?`+${value}`:String(value);}
    function statusLabel(player){if(!player)return"No live feed match";if(player.status&&player.status!=="X")return player.status;if(player.newStatus&&player.newStatus!=="X")return player.newStatus;if(player.thru)return`Thru ${player.thru}`;if(player.round1&&player.round1.roundStatus==="Pre")return player.teetime?`Tee ${player.teetime}`:"Not started";return"Waiting";}
    function isNonCountingStarter(player){if(!player)return false;return /(MC|WD|DQ|DNS)/.test([player.status,player.newStatus,player.total,player.today,player.pos].join(" ").toUpperCase());}
    function scoreMapFromFeed(feedPlayers){const map=new Map();feedPlayers.forEach((p)=>map.set(norm(p.full_name),p));return map;}
    function buildManagerResults(scoreMap){return state.managers.map((manager)=>{const slotResults=slots.map((slot)=>{const name=manager[slot.key];const livePlayer=name?scoreMap.get(norm(name)):null;const numeric=livePlayer?parseScoreValue(livePlayer.total):null;return{slot,name,livePlayer,numeric,counts:slot.starter,replacedStarter:false};});const starters=slotResults.filter((x)=>x.slot.starter);const alt=slotResults.find((x)=>x.slot.key==="alt");const replacementIndex=starters.findIndex((x)=>isNonCountingStarter(x.livePlayer));if(replacementIndex>=0&&alt&&alt.name){starters[replacementIndex].counts=false;alt.counts=true;alt.replacedStarter=true;}const counting=slotResults.filter((x)=>x.counts);const nums=counting.map((x)=>x.numeric).filter((x)=>x!==null);const total=nums.length===counting.length?nums.reduce((a,b)=>a+b,0):null;const partial=nums.length?nums.reduce((a,b)=>a+b,0):null;return{name:manager.name,slotResults,total,partial};}).sort((a,b)=>{const av=a.total!==null?a.total:Number.POSITIVE_INFINITY;const bv=b.total!==null?b.total:Number.POSITIVE_INFINITY;if(av!==bv)return av-bv;const ap=a.partial!==null?a.partial:Number.POSITIVE_INFINITY;const bp=b.partial!==null?b.partial:Number.POSITIVE_INFINITY;return ap-bp;});}
    function renderDraftClock(){const turn=currentTurn();if(state.draftOrder.length!==people.length){return`<div class="eyebrow">Draft Status</div><div class="clock-name">Generate the order</div><div class="clock-meta">Click <strong>Generate Draft Order</strong> to randomize the snake draft and put the first person on the clock. The draft is saved locally in this browser, so tonight's board will still be here tomorrow.</div>`;}if(!turn){return`<div class="eyebrow">Draft Complete</div><div class="clock-name">Finished squads saved</div><div class="clock-meta">All 20 picks are locked in locally on this browser. Use <strong>Open Results Tab</strong> for tomorrow's live team totals.</div>`;}const manager=state.managers[turn.managerIndex];return`<div class="eyebrow">On The Clock</div><div class="clock-name">${esc(manager.name)}</div><div class="clock-meta">Overall pick ${turn.overallPick} of ${people.length*slots.length} • Round ${turn.round} • ${esc(turn.slotLabel)} • No time limit</div>`;}
    function renderDraftOrderBoard(){if(state.draftOrder.length!==people.length)return"";const turn=currentTurn();const sequence=buildSnakeSequence(state.draftOrder);return Array.from({length:slots.length},(_,roundIndex)=>sequence.filter((pick)=>pick.round===roundIndex+1)).map((round)=>`<div class="round"><div class="round-title">Round ${round[0].round} • ${esc(round[0].slotLabel)}</div><div class="round-picks">${round.map((pick)=>{const done=pick.overallPick<=state.pickHistory.length;const active=turn&&pick.overallPick===turn.overallPick;const cls=active?"pill active":done?"pill done":"pill";return`<span class="${cls}">${pick.overallPick}. ${esc(state.managers[pick.managerIndex].name)}</span>`;}).join("")}</div></div>`).join("");}
    function renderDraftPeople(){const turn=currentTurn();return state.managers.map((manager,managerIndex)=>{const isActive=turn&&turn.managerIndex===managerIndex;return`<article class="card ${isActive?"active":""}"><h3 class="name">${esc(manager.name)}</h3><div class="pick-list">${slots.map((slot)=>`<div class="pick ${(isActive&&turn.slotKey===slot.key)?"current":""}"><span class="label">${esc(slot.label)}</span><div>${esc(manager[slot.key]||"Open")}</div></div>`).join("")}</div><div class="small" style="margin-top:12px;">${isActive?"Currently drafting.":"Waiting for next turn."}</div></article>`;}).join("");}
    function renderPlayerRows(filterValue){const q=filterValue.trim().toLowerCase();const selections=pickedMap();const turn=currentTurn();return sortedPlayers.filter((player)=>!q||player.name.toLowerCase().includes(q)||player.country.toLowerCase().includes(q)).map((player)=>{const notes=[];if(player.first)notes.push('<span class="tag first">First Masters</span>');if(player.amateur)notes.push('<span class="tag amateur">Amateur</span>');if(!notes.length)notes.push('<span class="tag">Field</span>');const draftedBy=selections.get(player.name);const status=draftedBy?`Drafted by ${esc(draftedBy)}`:"Available";const action=draftedBy?'<button type="button" class="secondary" disabled>Taken</button>':`<button type="button" data-draft="${esc(player.name)}" ${turn?"":"disabled"}>Draft</button>`;const rank=powerRankByName.get(player.name);return`<tr><td>${rank?`#${rank}`:"-"}</td><td>${esc(player.name)}</td><td>${esc(player.country||"USA")}</td><td>${notes.join(" ")}</td><td>${status}</td><td>${action}</td></tr>`;}).join("");}
    function attachDraftEvents(){const searchInput=document.getElementById("player-search");const playersBody=document.getElementById("players-body");function rerenderPlayers(){playersBody.innerHTML=renderPlayerRows(searchInput.value);playersBody.querySelectorAll("button[data-draft]").forEach((button)=>button.addEventListener("click",()=>draftPlayer(button.dataset.draft)));}searchInput.addEventListener("input",rerenderPlayers);document.getElementById("generate-order").addEventListener("click",()=>{state={managers:baseManagers(),draftOrder:shuffle(people.map((_,i)=>i)),pickHistory:[]};saveState();renderDraft();});document.getElementById("undo-pick").addEventListener("click",()=>{const lastPick=state.pickHistory.pop();if(!lastPick)return;state.managers[lastPick.managerIndex][lastPick.slotKey]="";saveState();renderDraft();});document.getElementById("clear-board").addEventListener("click",resetDraft);document.getElementById("open-results").addEventListener("click",openResultsTab);document.getElementById("copy-summary").addEventListener("click",async()=>{const orderText=state.draftOrder.length===people.length?buildSnakeSequence(state.draftOrder).map((pick)=>`${pick.overallPick}. ${state.managers[pick.managerIndex].name}`).join("\n"):"Draft order not generated yet.";const teamText=state.managers.map((manager)=>`${manager.name}\n${slots.map((slot)=>`${slot.label}: ${manager[slot.key]||"Open"}`).join("\n")}`).join("\n\n");const text=`Draft order:\n${orderText}\n\nTeams:\n${teamText}`;const button=document.getElementById("copy-summary");try{await navigator.clipboard.writeText(text);button.textContent="Copied";}catch{button.textContent="Copy failed";}setTimeout(()=>{button.textContent="Copy Summary";},1200);});rerenderPlayers();document.getElementById("undo-pick").disabled=state.pickHistory.length===0;}
    function renderDraft(){const app=document.getElementById("app");app.innerHTML=`<section class="hero"><h1>2026 Masters Draft Board</h1><p>Snake draft for Samuel, Tristana, Gaza, Mason, and Nosrac. Each person drafts 4 golfers. The first 3 count toward the score, and the 4th golfer is the alternate if somebody misses the cut. The board is saved in this browser, so you can draft tonight and reopen it tomorrow.</p><div class="chips"><span class="chip">Tournament start: April 9, 2026</span><span class="chip">5 people</span><span class="chip">Snake draft format</span><span class="chip">Discord stream ready</span></div></section><div class="layout"><section class="panel"><div class="section-head"><h2>Draft Board</h2><p>Generate the order, draft from the player pool, and open the live results tab when the draft is done.</p></div><div class="toolbar"><button id="generate-order" type="button">Generate Draft Order</button><button id="undo-pick" class="secondary" type="button">Undo Last Pick</button><button id="clear-board" class="secondary" type="button">Reset Draft</button><button id="open-results" class="secondary" type="button">Open Results Tab</button><button id="copy-summary" class="ghost" type="button">Copy Summary</button></div><div class="clock">${renderDraftClock()}</div><div class="order-board">${renderDraftOrderBoard()}</div><div class="people">${renderDraftPeople()}</div><div class="summary"><strong>Round 1 order:</strong> ${esc(formatOrderLine())}<br>${state.managers.map((manager)=>`<strong>${esc(manager.name)}:</strong> ${esc(slots.map((slot)=>`${slot.label}: ${manager[slot.key]||"Open"}`).join(" | "))}`).join("<br>")}</div></section><section class="panel"><div class="section-head"><h2>Player Pool</h2><p>Official 2026 Masters field, ordered by Golf Digest's April 6, 2026 power rankings.</p></div><div class="toolbar"><input id="player-search" type="search" placeholder="Search players or countries"></div><div class="players-wrap"><table><thead><tr><th>Rank</th><th>Player</th><th>Country</th><th>Notes</th><th>Status</th><th>Action</th></tr></thead><tbody id="players-body"></tbody></table></div><div class="footer" style="margin-top:16px;">Sources: <a href="https://www.golfdigest.com/story/masters-2026-power-rankings-entire-field-august-national" target="_blank" rel="noreferrer">Golf Digest 2026 Masters power rankings</a> and <a href="https://www.masters.com/pdf/2026_Masters_Tournament_Invitees.pdf" target="_blank" rel="noreferrer">2026 Masters Tournament Invitees</a>, qualified as of April 5, 2026.</div></section></div>`;attachDraftEvents();}
    function renderResultsCards(){const draftFinished=state.pickHistory.length===people.length*slots.length;if(!draftFinished){const draftUrl=new URL(location.href);draftUrl.searchParams.delete("view");return`<div class="panel"><h2>Results Tab Not Ready Yet</h2><p class="muted">Finish the draft first. The completed squads are saved in this browser, so you can come back tomorrow and this page will still know the picks.</p><div class="toolbar" style="margin-top:14px;"><a class="btn ghost" href="${esc(draftUrl.toString())}">Back To Draft</a></div></div>`;}if(liveScoresState.status==="error"){return`<div class="panel"><h2>Live Scores Unavailable</h2><p class="muted">The official Masters live feed could not be loaded right now. Try the refresh button again in a moment.</p></div>`;}const scoreMap=scoreMapFromFeed(liveScoresState.players);const rankedManagers=buildManagerResults(scoreMap);return`<div class="results">${rankedManagers.map((manager,index)=>`<article class="card"><div class="result-head"><div><div class="name">${esc(manager.name)}</div><div class="score"><strong>${esc(formatToPar(manager.total!==null?manager.total:manager.partial))}</strong></div><div class="small">${manager.total!==null?"Official team total from counting golfers.":"Partial live total. Some counting golfers have not started or do not have a numeric score yet."}</div></div><div class="place">#${index+1}</div></div><div class="player-stack">${manager.slotResults.map((item)=>`<div class="player ${item.counts?"counting":""}"><span class="label">${esc(item.slot.label)}</span><div><strong>${esc(item.name||"Open")}</strong></div><div class="status-row" style="margin-top:6px;">${item.counts?'<span class="tag counting">Counting</span>':""}${item.replacedStarter?'<span class="tag alt">Alternate In Use</span>':""}</div><div class="score-meta" style="margin-top:8px;"><span class="pill">${esc(item.livePlayer&&item.livePlayer.pos?`Pos ${item.livePlayer.pos}`:"Pos -")}</span><span class="pill">${esc(item.livePlayer?`Total ${formatToPar(item.numeric)}`:"Total -")}</span><span class="pill">${esc(statusLabel(item.livePlayer))}</span></div></div>`).join("")}</div></article>`).join("")}</div>`;}
    function renderResultsStatusCard(){const updated=liveScoresState.updatedAt?new Date(liveScoresState.updatedAt).toLocaleString():"Waiting for live feed";return`<div class="clock"><div class="eyebrow">Live Team Tracker</div><div class="clock-name">Finished squads, live Masters scoring</div><div class="clock-meta">This page reads the official Masters live score feed every 30 seconds. Draft picks are saved locally in this browser from draft night to tournament day.</div><div class="chips" style="margin-top:16px;"><span class="chip">Feed: official Masters live scores</span><span class="chip">Last update: ${esc(updated)}</span><span class="chip">Round 1 starts April 9, 2026</span></div></div>`;}
    function renderResultsView(){const app=document.getElementById("app");const draftUrl=new URL(location.href);draftUrl.searchParams.delete("view");app.innerHTML=`<section class="hero"><h1>2026 Masters Live Results</h1><p>Read-only team tracker for Samuel, Tristana, Gaza, Mason, and Nosrac. This uses the official Masters live scoring feed and the draft saved in this browser.</p><div class="chips"><span class="chip">Official live scores feed</span><span class="chip">Auto refresh every 30 seconds</span><span class="chip">Saved locally from draft night</span></div></section><div class="layout" style="grid-template-columns:1fr;"><section class="panel"><div class="toolbar" style="margin-bottom:16px;"><a class="btn ghost" href="${esc(draftUrl.toString())}">Back To Draft</a><button id="refresh-scores" type="button">Refresh Live Scores</button></div>${renderResultsStatusCard()}${renderResultsCards()}</section></div>`;const refreshButton=document.getElementById("refresh-scores");if(refreshButton)refreshButton.addEventListener("click",()=>fetchLiveScores(true));}
    async function fetchLiveScores(manual){liveScoresState.status="loading";if(manual)renderResultsView();try{const response=await fetch(`${scoresFeedUrl}?t=${Date.now()}`,{cache:"no-store"});if(!response.ok)throw new Error(`HTTP ${response.status}`);const payload=await response.json();liveScoresState={status:"ready",updatedAt:Number(payload.fileEpoch)*1000||Date.now(),players:Array.isArray(payload&&payload.data&&payload.data.player)?payload.data.player:[]};}catch{liveScoresState={...liveScoresState,status:"error"};}renderResultsView();}
    if(isResultsView){renderResultsView();fetchLiveScores(false);liveScoresTimer=window.setInterval(()=>fetchLiveScores(false),30000);}else{renderDraft();}
  </script>
</body>
</html>
