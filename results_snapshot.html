<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Masters Results Snapshot</title>
  <style>
    :root{--bg:#f3efe4;--panel:#fffaf0;--ink:#1e2a1f;--muted:#5b6659;--line:#d7c9aa;--accent:#1d5c35;--accent2:#af7d28;--shadow:0 18px 40px rgba(31,41,28,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:Georgia,"Times New Roman",serif;color:var(--ink);background:linear-gradient(180deg,#efe4c7 0%,var(--bg) 45%,#e7efdf 100%)}
    .page{max-width:1400px;margin:0 auto;padding:28px 18px 40px}.hero,.panel{background:var(--panel);border:1px solid rgba(215,201,170,.8);border-radius:22px;box-shadow:var(--shadow)}
    .hero{padding:26px;background:linear-gradient(135deg,rgba(29,92,53,.96),rgba(18,53,31,.96));color:#fffaf0}.hero p{max-width:900px;line-height:1.5}
    .chips,.toolbar,.score-meta,.status-row,.round-summary{display:flex;flex-wrap:wrap;gap:10px}.chips{margin-top:16px}
    .chip,.pill{padding:8px 12px;border-radius:999px;font-size:.95rem}.chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18)}
    .layout{display:grid;grid-template-columns:1fr;gap:22px;margin-top:22px}.panel{padding:20px}
    button,a.btn{border:0;border-radius:12px;padding:10px 14px;font:inherit;cursor:pointer;background:var(--accent);color:#fff9ee;text-decoration:none}
    button.secondary{background:#e4d3af;color:var(--ink)} button:disabled{opacity:.55;cursor:not-allowed}
    .clock{margin-bottom:18px;padding:18px;border-radius:18px;background:linear-gradient(135deg,var(--accent),#2e7d49);color:#fff9ee}.eyebrow{font-size:.84rem;letter-spacing:.08em;text-transform:uppercase;opacity:.8}
    .clock-name{margin-top:8px;font-size:clamp(1.9rem,4vw,3.1rem);line-height:1}.clock-meta{margin-top:10px;line-height:1.45}
    .results{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
    .card{background:linear-gradient(180deg,rgba(248,241,223,.95),rgba(255,252,245,.95));border:1px solid var(--line);border-radius:18px;padding:16px}
    .result-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.place{min-width:52px;text-align:center;padding:8px 10px;border-radius:14px;background:#efe2bf;font-weight:700}
    .name{font-size:1.25rem;margin-bottom:12px}.score{font-size:1.6rem;line-height:1;margin-bottom:8px}
    .small{color:var(--muted)} .player-stack{display:grid;gap:10px}.player{border-radius:14px;background:#fffdf7;border:1px solid #eadfcb;padding:10px 12px}.player.counting{border-color:var(--accent2);background:#fff5dc}
    .label{display:block;margin-bottom:4px;color:var(--muted);font-size:.84rem;text-transform:uppercase;letter-spacing:.04em}
    .tag{display:inline-block;margin-right:6px;margin-top:4px;border-radius:999px;padding:4px 8px;font-size:.78rem;background:#e8f1e9;color:var(--accent)} .tag.counting{background:#dfeadf;color:#31563b} .tag.alt{background:#f1e5c8;color:#7a5a13}
    .round-summary{margin-top:8px;gap:8px}
    .round-pill{padding:6px 9px;border-radius:999px;background:#f3ecda;color:var(--ink);font-size:.8rem;border:1px solid #e5d8bc}
    @media (max-width:720px){.page{padding:18px 14px 32px}.results{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page" id="app"></div>
  <script>
    const scoresFeedUrl="https://www.masters.com/en_US/scores/feeds/2026/scores.json";
    const refreshMs=30000;
    const slots=[{key:"pick1",label:"Golfer 1",starter:true},{key:"pick2",label:"Golfer 2",starter:true},{key:"pick3",label:"Golfer 3",starter:true},{key:"alt",label:"Alternate",starter:false}];
    const state={"managers":[{"name":"Samuel","pick1":"Scottie Scheffler","pick2":"Bryson DeChambeau","pick3":"Min Woo Lee","alt":"Sam Burns"},{"name":"Tristana","pick1":"Jordan Spieth","pick2":"Collin Morikawa","pick3":"Patrick Reed","alt":"Matt Fitzpatrick"},{"name":"Gaza","pick1":"Ludvig Åberg","pick2":"Cameron Young","pick3":"Brooks Koepka","alt":"Si Woo Kim"},{"name":"Mason","pick1":"Rory McIlroy","pick2":"Justin Rose","pick3":"Hideki Matsuyama","alt":"Tommy Fleetwood"},{"name":"Nosrac","pick1":"Xander Schauffele","pick2":"Jon Rahm","pick3":"Justin Thomas","alt":"Viktor Hovland"}]};
    let liveScoresState={status:"loading",updatedAt:null,players:[]};

    function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}
    function norm(v){return String(v||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]/g,"").toLowerCase();}
    function parseScoreValue(value){if(value===null||value===undefined||value==="")return null;const text=String(value).trim().toUpperCase();if(text==="E")return 0;if(/^[+-]?\d+$/.test(text))return Number(text);return null;}
    function playerScoreValue(player){if(!player)return null;const toParScore=parseScoreValue(player.topar);if(toParScore!==null)return toParScore;const todayScore=parseScoreValue(player.today);if(todayScore!==null)return todayScore;return null;}
    function formatToPar(value){if(value===null||value===undefined)return"Not started";if(value===0)return"E";return value>0?`+${value}`:String(value);}
    function roundScoreValue(round){if(!round)return null;return parseScoreValue(round.fantasy);}
    function roundSummaryMarkup(player){if(!player)return'<div class="round-summary"><span class="round-pill">Tournament: Not started</span></div>';const rounds=["round1","round2","round3","round4"].map((key,index)=>{const round=player[key];if(!round||round.total===null||round.total===undefined)return `<span class="round-pill">R${index+1}: --</span>`;const roundScore=roundScoreValue(round);return `<span class="round-pill">R${index+1}: ${esc(round.total)} (${esc(formatToPar(roundScore))})</span>`;}).join("");return `<div class="round-summary">${rounds}<span class="round-pill">Tournament: ${esc(formatToPar(playerScoreValue(player)))}</span></div>`;}
    function statusLabel(player){if(!player)return"No live feed match";const rawStatus=String(player.status||player.newStatus||"").toUpperCase();if(rawStatus==="A"||rawStatus.startsWith("A"))return"Active";if(rawStatus==="N"||rawStatus.startsWith("N"))return"Not started";if(rawStatus==="F")return"Finished";if(rawStatus==="X"){if(player.thru)return`Thru ${player.thru}`;if(player.round1&&player.round1.roundStatus==="Pre")return player.teetime?`Tee ${player.teetime}`:"Not started";return"Waiting";}if(player.thru)return`Thru ${player.thru}`;return rawStatus||"Waiting";}
    function isNonCountingStarter(player){if(!player)return false;const status=String(player.status||"").trim().toUpperCase();const newStatus=String(player.newStatus||"").trim().toUpperCase();if(status==="C"||newStatus==="C")return true;return /(MC|WD|DQ|DNS)/.test([player.status,player.newStatus,player.total,player.today,player.pos].join(" ").toUpperCase());}
    function scoreMapFromFeed(feedPlayers){const map=new Map();feedPlayers.forEach((p)=>map.set(norm(p.full_name),p));return map;}
    function buildManagerResults(scoreMap){return state.managers.map((manager)=>{const slotResults=slots.map((slot)=>{const name=manager[slot.key];const livePlayer=name?scoreMap.get(norm(name)):null;const numeric=playerScoreValue(livePlayer);return{slot,name,livePlayer,numeric,counts:slot.starter,replacedStarter:false};});const starters=slotResults.filter((x)=>x.slot.starter);const alt=slotResults.find((x)=>x.slot.key==="alt");const replacementIndex=starters.findIndex((x)=>isNonCountingStarter(x.livePlayer));if(replacementIndex>=0&&alt&&alt.name){starters[replacementIndex].counts=false;alt.counts=true;alt.replacedStarter=true;}const counting=slotResults.filter((x)=>x.counts);const nums=counting.map((x)=>x.numeric).filter((x)=>x!==null);const total=nums.length===counting.length?nums.reduce((a,b)=>a+b,0):null;const partial=nums.length?nums.reduce((a,b)=>a+b,0):null;const rankScore=total!==null?total:partial!==null?partial:Number.POSITIVE_INFINITY;const startedCount=slotResults.filter((x)=>x.numeric!==null).length;return{name:manager.name,slotResults,total,partial,rankScore,startedCount};}).sort((a,b)=>{if(a.rankScore!==b.rankScore)return a.rankScore-b.rankScore;if(a.startedCount!==b.startedCount)return b.startedCount-a.startedCount;return a.name.localeCompare(b.name);});}
    function render(){const app=document.getElementById("app");if(liveScoresState.status==="error"){app.innerHTML=`<section class="hero"><h1>2026 Masters Results Snapshot</h1><p>This standalone snapshot contains your locked teams and pulls the live Masters feed directly.</p><div class="chips"><span class="chip">Snapshot link for all browsers</span></div></section><div class="layout"><section class="panel"><div class="clock"><div class="eyebrow">Live Team Tracker</div><div class="clock-name">Live scores unavailable</div><div class="clock-meta">The official Masters feed could not be loaded right now. Try refreshing the page.</div></div></section></div>`;return;}const scoreMap=scoreMapFromFeed(liveScoresState.players);const rankedManagers=buildManagerResults(scoreMap);const updated=liveScoresState.updatedAt?new Date(liveScoresState.updatedAt).toLocaleString():"Waiting for live feed";app.innerHTML=`<section class="hero"><h1>2026 Masters Results Snapshot</h1><p>This is a standalone results page for your drafted teams. It does not depend on local storage, redirects, or long shared links.</p><div class="chips"><span class="chip">Safari-friendly snapshot</span><span class="chip">Auto refresh every 30 seconds</span></div></section><div class="layout"><section class="panel"><div class="toolbar" style="margin-bottom:16px;"><button id="refresh-scores" type="button">Refresh Live Scores</button></div><div class="clock"><div class="eyebrow">Live Team Tracker</div><div class="clock-name">Finished squads, live Masters scoring</div><div class="clock-meta">Official Masters live feed. Last update: ${esc(updated)}</div><div class="chips"><span class="chip">Round 1 started April 9, 2026</span></div></div><div class="results">${rankedManagers.map((manager,index)=>`<article class="card"><div class="result-head"><div><div class="name">${esc(manager.name)}</div><div class="score"><strong>${esc(formatToPar(manager.total!==null?manager.total:manager.partial))}</strong></div><div class="small">${manager.total!==null?"Official team total from counting golfers.":"Partial live total. Some counting golfers have not started or do not have a numeric score yet."}</div></div><div class="place">#${index+1}</div></div><div class="player-stack">${manager.slotResults.map((item)=>`<div class="player ${item.counts?"counting":""}"><span class="label">${esc(item.slot.label)}</span><div><strong>${esc(item.name||"Open")}</strong>: <strong>${esc(item.livePlayer?formatToPar(item.numeric):"Not started")}</strong></div>${roundSummaryMarkup(item.livePlayer)}<div class="status-row" style="margin-top:6px;">${item.counts?'<span class="tag counting">Counting</span>':""}${item.replacedStarter?'<span class="tag alt">Alternate In Use</span>':""}</div><div class="score-meta" style="margin-top:8px;"><span class="pill">${esc(item.livePlayer&&item.livePlayer.pos?item.livePlayer.pos:"-")}</span><span class="pill">${esc(statusLabel(item.livePlayer))}</span></div></div>`).join("")}</div></article>`).join("")}</div></section></div>`;document.getElementById("refresh-scores").addEventListener("click",()=>fetchLiveScores(true));}
    async function fetchLiveScores(manual){if(manual){liveScoresState.status="loading";render();}try{const response=await fetch(`${scoresFeedUrl}?t=${Date.now()}`,{cache:"no-store"});if(!response.ok)throw new Error(`HTTP ${response.status}`);const payload=await response.json();liveScoresState={status:"ready",updatedAt:Number(payload.fileEpoch)*1000||Date.now(),players:Array.isArray(payload&&payload.data&&payload.data.player)?payload.data.player:[]};}catch{liveScoresState={...liveScoresState,status:"error"};}render();}
    render();
    fetchLiveScores(false);
    window.setInterval(()=>fetchLiveScores(false),refreshMs);
  </script>
</body>
</html>
